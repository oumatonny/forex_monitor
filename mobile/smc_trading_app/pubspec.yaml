name: smc_trading_app
description: SMC Trading App with Real MT5 Data
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.0.5
  
  # Networking
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.64.0
  
  # Utils
  intl: ^0.18.1
  connectivity_plus: ^5.0.1
  vibration: ^1.7.7
  
  # Notifications
  flutter_local_notifications: ^15.1.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/